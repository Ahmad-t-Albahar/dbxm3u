name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller --clean dbxm3u.spec

      - name: Package portable zip
        shell: pwsh
        run: |
          if (Test-Path "dist\dbxm3u.exe") {
            $exePath = "dist\dbxm3u.exe"
            Copy-Item -Force $exePath "dbxm3u-windows.exe"
            Compress-Archive -Path "dbxm3u-windows.exe" -DestinationPath "dbxm3u-windows.zip" -Force
          } else {
            Compress-Archive -Path "dist\*" -DestinationPath "dbxm3u-windows.zip" -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbxm3u-windows
          path: |
            dist/
            dbxm3u-windows.zip
            dbxm3u-windows.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dbxm3u-windows.zip
            dbxm3u-windows.exe
